<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frost Fleet | Elite Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --red: #E62411; --bg: #111111; --card: #1d1f20; --text: #f4f7f6; --border: #333; --active: #28a745; --payroll: #f39c12; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; color: var(--text); overflow: hidden; }
        
        /* SIDEBAR */
        .sidebar { width: 320px; background: var(--card); border-right: 2px solid var(--border); display: flex; flex-direction: column; z-index: 10; }
        .sidebar-header { padding: 25px; border-bottom: 1px solid var(--border); font-weight: 900; color: var(--red); text-transform: uppercase; font-size: 1.2rem; }
        .sidebar-content { flex: 1; padding: 20px; font-size: 13px; color: #888; overflow-y: auto; }
        .map-dock { height: 320px; border-top: 3px solid var(--red); background: #000; }
        #sidebar-map { width: 100%; height: 100%; border: none; display: none; }
        
        /* MAIN */
        .main-wrapper { flex: 1; display: flex; flex-direction: column; overflow-y: auto; padding: 25px; }
        .header { display: flex; justify-content: space-between; align-items: center; background: var(--card); padding: 20px 30px; border-radius: 12px; border-bottom: 5px solid var(--red); margin-bottom: 25px; }
        .logo { font-size: 26px; font-weight: 900; text-transform: uppercase; }
        .logo span { color: var(--red); }
        
        /* TOGGLE & BUTTONS */
        .action-bar { display: flex; gap: 10px; align-items: center; }
        .view-toggle { background: #333; padding: 5px; border-radius: 8px; display: flex; gap: 5px; margin-right: 10px; }
        .toggle-btn { padding: 8px 15px; border-radius: 5px; border: none; cursor: pointer; font-size: 10px; font-weight: 800; text-transform: uppercase; color: #777; background: transparent; transition: 0.3s; }
        .toggle-btn.active { background: var(--red); color: white; }
        
        .btn { background: var(--red); color: white; border: none; padding: 10px 15px; border-radius: 6px; font-weight: 700; cursor: pointer; text-transform: uppercase; font-size: 10px; text-decoration: none; display: inline-flex; align-items: center; }
        
        /* TABLE & STATS */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; margin-bottom: 25px; }
        .stat-card { background: var(--card); padding: 20px; border-radius: 10px; border-left: 5px solid #333; }
        .stat-card h3 { margin: 0; font-size: 11px; color: #888; text-transform: uppercase; }
        .stat-card p { margin: 10px 0 0; font-size: 32px; font-weight: 800; }
        
        .table-container { background: var(--card); border-radius: 12px; overflow-x: auto; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; min-width: 1100px; }
        th { padding: 18px; font-size: 11px; text-transform: uppercase; color: #777; border-bottom: 2px solid var(--border); text-align: left; }
        td { padding: 16px 18px; border-bottom: 1px solid var(--border); font-size: 14px; }
        .badge { padding: 5px 10px; border-radius: 4px; font-size: 10px; font-weight: 900; text-transform: uppercase; }
        .badge-active { background: var(--active); color: white; }
        .map-link { color: #3498db; cursor: pointer; font-weight: 800; border-bottom: 1px dashed #3498db; }
        .check-cell { font-weight: bold; cursor: help; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-header">Frost Tracker</div>
        <div class="sidebar-content" id="sidebar-info">
            <p><strong>Status:</strong> Operational</p>
            <p id="view-indicator">Showing: <b>Current Week</b></p>
        </div>
        <div class="map-dock">
            <iframe id="sidebar-map" referrerpolicy="no-referrer-when-downgrade"></iframe>
        </div>
    </aside>

    <div class="main-wrapper">
        <div class="header">
            <div class="logo">Frost<span>Fleet</span> Elite</div>
            <div class="action-bar">
                <div class="view-toggle">
                    <button class="toggle-btn active" id="btn-curr" onclick="setView('current')">Current Week</button>
                    <button class="toggle-btn" id="btn-prev" onclick="setView('previous')">Last Week</button>
                </div>
                <a href="https://docs.google.com/spreadsheets/d/1LJpZqCfRlNNNr494sCB5Ax1hFwFh4e7LzAIa0sTHoks/edit?usp=sharing" target="_blank" class="btn">⛽ Fuel</a>
                <a href="https://docs.google.com/spreadsheets/d/1nZvQOplnru5hUCy4VRmm7bVHOwuJyzvV4CD3DyDGmO0/edit?usp=sharing" target="_blank" class="btn">🚛 Trailers</a>
                <button class="btn" onclick="loadData()">🔄 Refresh</button>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card"><h3>Drivers</h3><p id="stat-total">0</p></div>
            <div class="stat-card" style="border-left-color: var(--active)"><h3>On Duty</h3><p id="stat-active">0</p></div>
            <div class="stat-card" style="border-left-color: var(--red)"><h3>15hr Alerts</h3><p id="stat-long">0</p></div>
            <div class="stat-card" style="border-left-color: var(--payroll)"><h3>Nights Out</h3><p id="stat-nights">0</p></div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Driver</th>
                        <th>Status</th>
                        <th>Weekly Hours</th>
                        <th>15hr Usage</th>
                        <th>Nights</th>
                        <th>Last Action</th>
                        <th>Vehicle Check</th>
                        <th>Location</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://mbudwnwxucluwgbkgbfx.supabase.co"; 
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1idWR3bnd4dWNsdXdnYmtnYmZ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyMDQwMjYsImV4cCI6MjA5MDc4MDAyNn0.xFv-FiQ894vdfJuQYWQyF4WzQXmlnmnKvz_c8nuzl5Q"; 
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzeQNNTsffmVMKNFhyJ9VQ-LVF_R58QMBTQQnC5enWwSrKaVHv9vC5r8_pryxAonfmXlg/exec";
        
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let currentView = 'current'; // 'current' or 'previous'

        function setView(view) {
            currentView = view;
            document.getElementById('btn-curr').classList.toggle('active', view === 'current');
            document.getElementById('btn-prev').classList.toggle('active', view === 'previous');
            document.getElementById('view-indicator').innerHTML = `Showing: <b>${view === 'current' ? 'Current Week' : 'Previous Week'}</b>`;
            loadData();
        }

        function updateDock(coords, name) {
            const mapFrame = document.getElementById('sidebar-map');
            mapFrame.style.display = "block";
            mapFrame.src = `https://www.google.com/maps?q=${coords}&t=k&z=15&output=embed`;
            document.getElementById('sidebar-info').innerHTML = `<div style="background:var(--red);padding:15px;border-radius:8px;color:white;"><strong>${name.toUpperCase()}</strong></div>`;
        }

        async function loadData() {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = "<tr><td colspan='8' style='text-align:center; padding:50px;'>SYNCING DATA...</td></tr>";

            try {
                // 1. Fetch Vehicle Checks
                const vRes = await fetch(GOOGLE_SCRIPT_URL);
                const vehicleData = await vRes.json();

                // 2. Calculate Date Ranges
                const now = new Date();
                const day = now.getDay(); // 0 is Sun, 1 is Mon
                const diffToMonday = day === 0 ? -6 : 1 - day;
                
                let startRange = new Date(now);
                startRange.setDate(now.getDate() + diffToMonday);
                startRange.setHours(0,0,0,0);

                let endRange = new Date(); // Default for current week is 'now'

                if (currentView === 'previous') {
                    endRange = new Date(startRange); // End of last week is start of this week
                    startRange.setDate(startRange.getDate() - 7); // Start of last week is 7 days prior
                }

                // 3. Fetch Supabase Logs
                const { data: logs, error } = await _supabase
                    .from('fleet_logs')
                    .select('*')
                    .gte('created_at', startRange.toISOString())
                    .lt('created_at', endRange.toISOString())
                    .order('created_at', { ascending: true });

                if (error) throw error;

                const report = {};
                let activeCount = 0, longCount = 0, nightCount = 0;

                logs.forEach(log => {
                    const nameKey = log.driver_name.toLowerCase().trim();
                    if (!report[nameKey]) {
                        report[nameKey] = { displayName: log.driver_name, totalMs: 0, lastStart: null, status: 'OFFLINE', longShifts: 0, nights: 0, lastLoc: log.coordinates, lastTime: '' };
                    }
                    const d = report[nameKey];
                    if (log.action_type === 'START') {
                        d.lastStart = new Date(log.created_at);
                        d.status = 'ACTIVE';
                    } else if (log.action_type === 'END' && d.lastStart) {
                        const shiftMs = new Date(log.created_at) - d.lastStart;
                        d.totalMs += shiftMs;
                        if (shiftMs > (15 * 60 * 60 * 1000)) d.longShifts++;
                        d.lastStart = null;
                        d.status = 'OFFLINE';
                    } else if (log.action_type === 'NIGHT OUT') {
                        d.nights++;
                    }
                    d.lastLoc = log.coordinates;
                    d.lastTime = new Date(log.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                });

                tbody.innerHTML = "";
                Object.keys(report).forEach(key => {
                    const d = report[key];
                    const vInfo = vehicleData[key] || { status: "⌛ NO CHECK", detail: "No data." };
                    const vColor = vInfo.status.includes("⚠️") ? "var(--red)" : (vInfo.status.includes("✅") ? "var(--active)" : "#777");
                    
                    if (d.status === 'ACTIVE') activeCount++;
                    longCount += d.longShifts;
                    nightCount += d.nights;

                    tbody.innerHTML += `
                        <tr>
                            <td><strong>${d.displayName.toUpperCase()}</strong></td>
                            <td><span class="badge ${d.status === 'ACTIVE' ? 'badge-active' : ''}" style="background:${d.status === 'ACTIVE' ? '' : '#444'}">${d.status}</span></td>
                            <td style="font-weight:700;">${(d.totalMs / (1000 * 60 * 60)).toFixed(2)}h</td>
                            <td style="color:${d.longShifts >= 3 ? 'var(--red)' : 'inherit'}; font-weight:bold;">${d.longShifts}/3</td>
                            <td>${d.nights}</td>
                            <td style="opacity:0.6">${d.lastTime}</td>
                            <td class="check-cell" style="color:${vColor}" title="${vInfo.detail}">${vInfo.status}</td>
                            <td><span class="map-link" onclick="updateDock('${d.lastLoc}', '${d.displayName}')">📍 View GPS</span></td>
                        </tr>
                    `;
                });

                document.getElementById('stat-total').innerText = Object.keys(report).length;
                document.getElementById('stat-active').innerText = activeCount;
                document.getElementById('stat-long').innerText = longCount;
                document.getElementById('stat-nights').innerText = nightCount;

            } catch (err) {
                tbody.innerHTML = `<tr><td colspan='8' style='text-align:center; color:orange; padding:30px;'>SYNC ERROR</td></tr>`;
            }
        }

        window.onload = loadData;
        setInterval(() => { if(currentView === 'current') loadData(); }, 60000); 
    </script>
</body>
</html>
