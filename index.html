<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FTS DATA CENTRE</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        :root { 
            --red: #E62411; --bg: #020617; --sidebar: #0f172a; --card: #1e293b; 
            --text: #f8fafc; --border: #334155; --active: #22c55e; 
            --payroll: #f59e0b; --money: #10b981; --blue: #3b82f6; 
        }

        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; color: var(--text); overflow: hidden; }
        
        /* SIDEBAR */
        .sidebar { width: 320px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 10; }
        .sidebar-header { padding: 25px; border-bottom: 1px solid var(--border); font-weight: 900; color: var(--red); text-transform: uppercase; font-size: 1.2rem; letter-spacing: 1px; }
        .sidebar-content { flex: 1; padding: 20px; font-size: 13px; color: #94a3b8; overflow-y: auto; line-height: 1.6; }
        .map-dock { height: 320px; border-top: 3px solid var(--red); background: #000; position: relative; }
        #sidebar-map { width: 100%; height: 100%; border: none; display: none; }
        
        /* MAIN CONTENT */
        .main-wrapper { flex: 1; display: flex; flex-direction: column; overflow-y: auto; padding: 25px; position: relative; }
        .header { display: flex; justify-content: space-between; align-items: center; background: var(--card); padding: 20px 30px; border-radius: 12px; border-bottom: 4px solid var(--red); margin-bottom: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .logo { font-size: 26px; font-weight: 900; text-transform: uppercase; letter-spacing: -1px; }
        .logo span { color: var(--red); }
        
        .action-bar { display: flex; gap: 10px; align-items: center; }
        .btn { background: var(--red); color: white; border: none; padding: 10px 15px; border-radius: 6px; font-weight: 700; cursor: pointer; text-transform: uppercase; font-size: 10px; text-decoration: none; display: inline-flex; align-items: center; }
        .btn-alt { background: var(--border); color: #cbd5e1; }
        .btn-download { background: var(--blue); }

        /* CUSTOM POPOVER BOX */
        .popover {
            display: none; position: absolute; background: #0f172a; border: 1px solid var(--red);
            padding: 15px; border-radius: 8px; z-index: 1000; box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            max-width: 300px; color: #e2e8f0; font-size: 12px; line-height: 1.6;
        }
        .popover-header { font-weight: 900; color: var(--red); margin-bottom: 8px; border-bottom: 1px solid #334155; padding-bottom: 5px; display: flex; justify-content: space-between; }
        .close-pop { cursor: pointer; color: #64748b; font-size: 16px; font-weight: bold; }

        /* STAT CARDS */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 25px; }
        .stat-card { background: var(--card); padding: 15px; border-radius: 10px; border-left: 5px solid var(--border); }
        .stat-card h3 { margin: 0; font-size: 9px; color: #94a3b8; text-transform: uppercase; }
        .stat-card p { margin: 8px 0 0; font-size: 22px; font-weight: 800; }
        
        /* TABLE */
        .table-container { background: var(--card); border-radius: 12px; overflow-x: auto; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; min-width: 1100px; }
        th { padding: 18px; font-size: 11px; text-transform: uppercase; color: #94a3b8; border-bottom: 2px solid var(--border); text-align: left; background: rgba(0,0,0,0.1); }
        td { padding: 16px 18px; border-bottom: 1px solid var(--border); font-size: 14px; }
        
        .driver-name { cursor: pointer; color: var(--blue); font-weight: 800; border-bottom: 1px dashed var(--blue); }
        .badge { padding: 5px 10px; border-radius: 4px; font-size: 10px; font-weight: 900; text-transform: uppercase; }
        .badge-active { background: var(--active); color: white; }
        .map-link { color: var(--blue); cursor: pointer; font-weight: 800; font-size: 11px; }

        /* MODAL */
        #manual-modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(2, 6, 23, 0.9); }
        .modal-content { background: var(--card); margin: 8% auto; padding: 30px; border-radius: 12px; width: 400px; border: 1px solid var(--border); }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 11px; color: #94a3b8; margin-bottom: 5px; text-transform: uppercase; font-weight: bold; }
        .form-group input, .form-group select { width: 100%; padding: 12px; background: var(--bg); border: 1px solid var(--border); color: white; border-radius: 5px; box-sizing: border-box; }
    </style>
</head>
<body>

    <div id="popover-box" class="popover">
        <div class="popover-header"><span id="pop-name">DRIVER LOG</span> <span class="close-pop" onclick="hidePopover()">×</span></div>
        <div id="pop-content" style="white-space: pre-wrap;"></div>
        <div style="font-size: 9px; color: #64748b; margin-top: 10px; border-top: 1px solid #334155; padding-top: 5px;">Highlight text above to copy.</div>
    </div>

    <div id="manual-modal">
        <div class="modal-content">
            <h2 style="color:var(--red); text-transform:uppercase; font-size:18px; margin-top:0; border-bottom:1px solid var(--border); padding-bottom:15px;">Manual Log Entry</h2>
            <div class="form-group">
                <label>Select Driver</label>
                <select id="manual-driver-select" onchange="toggleNewDriverInput()"></select>
            </div>
            <div id="new-driver-container" class="form-group" style="display:none;">
                <label>New Driver Name</label>
                <input type="text" id="manual-driver-new" placeholder="Enter Full Name">
            </div>
            <div class="form-group">
                <label>Action Type</label>
                <select id="manual-action">
                    <option value="START">START (Clock In)</option>
                    <option value="END">END (Clock Out)</option>
                    <option value="NIGHT OUT">NIGHT OUT</option>
                </select>
            </div>
            <div class="form-group">
                <label>Date & Time</label>
                <input type="datetime-local" id="manual-time">
            </div>
            <div style="display:flex; gap:10px; margin-top:25px;">
                <button class="btn" style="flex:1; padding: 15px;" onclick="submitManualEntry()">Submit Entry</button>
                <button class="btn btn-alt" style="padding: 15px;" onclick="closeModal()">Cancel</button>
            </div>
        </div>
    </div>

    <aside class="sidebar">
        <div class="sidebar-header">FTS DATA</div>
        <div class="sidebar-content" id="sidebar-info">
            <p><strong>System:</strong> Operational</p>
            <p id="view-indicator">Showing: <b>Current Week</b></p>
            <p style="margin-top:10px; color:var(--payroll)">Rate: £22.04/hr</p>
        </div>
        <div class="map-dock"><iframe id="sidebar-map" referrerpolicy="no-referrer-when-downgrade"></iframe></div>
    </aside>

    <div class="main-wrapper">
        <div class="header">
            <div class="logo">FTS <span>DATA CENTRE</span></div>
            <div class="action-bar">
                <button class="btn btn-download" onclick="downloadLastWeekPDF()">📄 Export PDF</button>
                <a href="https://docs.google.com/spreadsheets/d/1LJpZqCfRlNNNr494sCB5Ax1hFwFh4e7LzAIa0sTHoks/edit?usp=sharing" target="_blank" class="btn">⛽ Fuel</a>
                <a href="https://docs.google.com/spreadsheets/d/1nZvQOplnru5hUCy4VRmm7bVHOwuJyzvV4CD3DyDGmO0/edit?usp=sharing" target="_blank" class="btn">🚛 Trailer</a>
                <button class="btn btn-alt" onclick="openModal()">➕ Manual</button>
                <button class="btn" onclick="loadData()">🔄 Refresh</button>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card"><h3>Drivers</h3><p id="stat-total">0</p></div>
            <div class="stat-card" style="border-left-color: var(--active)"><h3>On Duty</h3><p id="stat-active" style="color:var(--active)">0</p></div>
            <div class="stat-card" style="border-left-color: var(--payroll)"><h3>Nights Out</h3><p id="stat-nights" style="color:var(--payroll)">0</p></div>
            <div class="stat-card" style="border-left-color: var(--money)"><h3>Wage Bill</h3><p id="stat-wages" style="color:var(--money)">£0.00</p></div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr><th>Driver (Click for Log)</th><th>Status</th><th>Weekly Hours</th><th>15hr Usage</th><th>Nights</th><th>Last Action</th><th>Check</th><th>GPS</th></tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://mbudwnwxucluwgbkgbfx.supabase.co"; 
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1idWR3bnd4dWNsdXdnYmtnYmZ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyMDQwMjYsImV4cCI6MjA5MDc4MDAyNn0.xFv-FiQ894vdfJuQYWQyF4WzQXmlnmnKvz_c8nuzl5Q"; 
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzeQNNTsffmVMKNFhyJ9VQ-LVF_R58QMBTQQnC5enWwSrKaVHv9vC5r8_pryxAonfmXlg/exec";
        const HOURLY_RATE = 22.04;

        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let knownDrivers = [];

        // UI ACTIONS
        function showPopover(event, name, logs) {
            const pop = document.getElementById('popover-box');
            document.getElementById('pop-name').innerText = name.toUpperCase();
            document.getElementById('pop-content').innerText = logs || "No completed shifts recorded.";
            pop.style.display = 'block';
            pop.style.left = (event.pageX + 10) + 'px';
            pop.style.top = (event.pageY + 10) + 'px';
        }
        function hidePopover() { document.getElementById('popover-box').style.display = 'none'; }
        function openModal() { 
            const select = document.getElementById('manual-driver-select');
            select.innerHTML = '<option value="">-- Choose Driver --</option>';
            knownDrivers.forEach(d => { select.innerHTML += `<option value="${d}">${d.toUpperCase()}</option>`; });
            select.innerHTML += '<option value="NEW_DRIVER">-- Add New Driver... --</option>';
            document.getElementById('manual-modal').style.display = 'block'; 
        }
        function closeModal() { document.getElementById('manual-modal').style.display = 'none'; }
        function toggleNewDriverInput() { const select = document.getElementById('manual-driver-select'); document.getElementById('new-driver-container').style.display = (select.value === 'NEW_DRIVER') ? 'block' : 'none'; }
        function updateDock(coords, name) { const f = document.getElementById('sidebar-map'); f.style.display="block"; f.src = `https://maps.google.com/maps?q=${coords}&t=k&z=15&output=embed`; document.getElementById('sidebar-info').innerHTML = `<div style="background:var(--red);padding:15px;border-radius:8px;color:white;">LOCK: <strong>${name.toUpperCase()}</strong></div>`; }

        // PDF EXPORT
        async function downloadLastWeekPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('l', 'mm', 'a4');
            const now = new Date();
            const day = now.getDay();
            const diff = day === 0 ? -6 : 1 - day;
            let start = new Date(now.setDate(now.getDate() + diff));
            start.setHours(0,0,0,0);
            let end = new Date(start); start.setDate(start.getDate() - 7);

            const { data: logs } = await _supabase.from('fleet_logs').select('*').gte('created_at', start.toISOString()).lt('created_at', end.toISOString()).order('created_at', { ascending: true });

            const report = {};
            logs.forEach(log => {
                const key = log.driver_name.toLowerCase().trim();
                if (!report[key]) report[key] = { name: log.driver_name, totalMs: 0, lastStart: null, long: 0, nights: 0 };
                if (log.action_type === 'START') report[key].lastStart = new Date(log.created_at);
                else if (log.action_type === 'END' && report[key].lastStart) {
                    const shiftMs = new Date(log.created_at) - report[key].lastStart;
                    report[key].totalMs += shiftMs;
                    if (shiftMs > 54000000) report[key].long++;
                    report[key].lastStart = null;
                } else if (log.action_type === 'NIGHT OUT') report[key].nights++;
            });

            const rows = Object.values(report).map(d => [d.name.toUpperCase(), (d.totalMs/3600000).toFixed(2) + 'h', d.long + '/3', d.nights, '£' + ((d.totalMs/3600000)*HOURLY_RATE).toLocaleString()]);
            doc.text("FTS WEEKLY PAYROLL REPORT", 14, 20);
            doc.autoTable({ startY: 30, head: [['DRIVER', 'HOURS', '15hr', 'NIGHTS', 'WAGES']], body: rows, headStyles: { fillColor: [230, 36, 17] } });
            doc.save(`FTS_Payroll_${start.toLocaleDateString()}.pdf`);
        }

        // MAIN DATA LOAD
        async function loadData() {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = "<tr><td colspan='8' style='text-align:center; padding:40px;'>Syncing...</td></tr>";
            try {
                const vRes = await fetch(GOOGLE_SCRIPT_URL);
                const vehicleData = await vRes.json();
                const now = new Date();
                const day = now.getDay();
                const diff = day === 0 ? -6 : 1 - day;
                let start = new Date(now.setDate(now.getDate() + diff));
                start.setHours(0,0,0,0);

                const { data: logs } = await _supabase.from('fleet_logs').select('*').gte('created_at', start.toISOString()).order('created_at', { ascending: true });
                
                const report = {};
                let activeCount = 0, nights = 0, totalMs = 0;
                let driverSet = new Set();
                
                logs.forEach(log => {
                    const key = log.driver_name.toLowerCase().trim();
                    driverSet.add(log.driver_name);
                    if (!report[key]) report[key] = { name: log.driver_name, ms: 0, lastStart: null, shifts: [], status: 'OFFLINE', long: 0, nights: 0, lastTime: '', lastLoc: log.coordinates };
                    const d = report[key];
                    const dateObj = new Date(log.created_at);
                    if (log.action_type === 'START') { d.lastStart = dateObj; d.status = 'ACTIVE'; }
                    else if (log.action_type === 'END' && d.lastStart) {
                        const shiftMs = dateObj - d.lastStart;
                        d.ms += shiftMs; totalMs += shiftMs;
                        if (shiftMs > 54000000) d.long++;
                        d.shifts.push(`${dateObj.toLocaleDateString([],{weekday:'short'})}: ${d.lastStart.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})} - ${dateObj.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})} (${(shiftMs/3600000).toFixed(1)}h)`);
                        d.lastStart = null; d.status = 'OFFLINE';
                    } else if (log.action_type === 'NIGHT OUT') { d.nights++; nights++; }
                    d.lastTime = dateObj.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
                    d.lastLoc = log.coordinates;
                });

                knownDrivers = Array.from(driverSet).sort();
                tbody.innerHTML = "";
                Object.keys(report).sort().forEach(key => {
                    const d = report[key];
                    const v = vehicleData[key] || { status: "No Check" };
                    if (d.status === 'ACTIVE') activeCount++;
                    tbody.innerHTML += `<tr>
                        <td><span class="driver-name" onclick="showPopover(event, '${d.name}', \`${d.shifts.join('\n')}\`)">${d.name.toUpperCase()}</span></td>
                        <td><span class="badge ${d.status==='ACTIVE'?'badge-active':''}" style="background:${d.status==='ACTIVE'?'':'#334155'}">${d.status}</span></td>
                        <td>${(d.ms/3600000).toFixed(2)}h</td>
                        <td>${d.long}/3</td>
                        <td>${d.nights}</td>
                        <td style="opacity:0.6">${d.lastTime}</td>
                        <td style="color:${v.status.includes('⚠️')?'var(--red)':'#94a3b8'}">${v.status}</td>
                        <td><span class="map-link" onclick="updateDock('${d.lastLoc}', '${d.name}')">📍 GPS</span></td>
                    </tr>`;
                });

                document.getElementById('stat-total').innerText = Object.keys(report).length;
                document.getElementById('stat-active').innerText = activeCount;
                document.getElementById('stat-nights').innerText = nights;
                document.getElementById('stat-wages').innerText = `£${((totalMs/3600000)*HOURLY_RATE).toLocaleString()}`;
            } catch (e) { tbody.innerHTML = "<tr><td colspan='8'>Error</td></tr>"; }
        }

        async function submitManualEntry() {
            const select = document.getElementById('manual-driver-select');
            let name = select.value === 'NEW_DRIVER' ? document.getElementById('manual-driver-new').value : select.value;
            const action = document.getElementById('manual-action').value;
            const time = document.getElementById('manual-time').value;
            if(!name || !time) return alert("Missing Info");
            await _supabase.from('fleet_logs').insert([{ driver_name: name.trim(), action_type: action, created_at: new Date(time).toISOString(), coordinates: "53.1424,-1.1396" }]);
            closeModal(); loadData();
        }

        window.onload = loadData;
        setInterval(loadData, 60000);
    </script>
</body>
</html>
