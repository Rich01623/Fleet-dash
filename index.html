<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frost Fleet | Elite Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --red: #E62411; --bg: #111111; --card: #1d1f20; --text: #f4f7f6; --border: #333; --active: #28a745; --payroll: #f39c12; }
        [data-theme="light"] { --bg: #f4f7f6; --card: #ffffff; --text: #2d3436; --border: #edf2f7; }
        
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; color: var(--text); overflow: hidden; transition: background 0.3s; }
        
        /* SIDEBAR */
        .sidebar { width: 320px; background: var(--card); border-right: 2px solid var(--border); display: flex; flex-direction: column; z-index: 10; }
        .sidebar-header { padding: 25px; border-bottom: 1px solid var(--border); font-weight: 900; color: var(--red); text-transform: uppercase; font-size: 1.2rem; letter-spacing: 1px; }
        .sidebar-content { flex: 1; padding: 20px; font-size: 13px; color: #888; overflow-y: auto; line-height: 1.6; }
        .map-dock { height: 320px; border-top: 3px solid var(--red); background: #000; position: relative; }
        #sidebar-map { width: 100%; height: 100%; border: none; display: none; }
        
        /* MAIN CONTENT */
        .main-wrapper { flex: 1; display: flex; flex-direction: column; overflow-y: auto; padding: 25px; }
        .header { display: flex; justify-content: space-between; align-items: center; background: var(--card); padding: 20px 30px; border-radius: 12px; border-bottom: 5px solid var(--red); margin-bottom: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .logo { font-size: 26px; font-weight: 900; text-transform: uppercase; }
        .logo span { color: var(--red); }
        
        /* STATS */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; margin-bottom: 25px; }
        .stat-card { background: var(--card); padding: 20px; border-radius: 10px; border-left: 5px solid #333; }
        .stat-card h3 { margin: 0; font-size: 11px; color: #888; text-transform: uppercase; }
        .stat-card p { margin: 10px 0 0; font-size: 32px; font-weight: 800; }
        
        /* TABLE */
        .table-container { background: var(--card); border-radius: 12px; overflow-x: auto; border: 1px solid var(--border); box-shadow: 0 15px 35px rgba(0,0,0,0.4); }
        table { width: 100%; border-collapse: collapse; min-width: 1100px; }
        th { padding: 18px; font-size: 11px; text-transform: uppercase; color: #777; border-bottom: 2px solid var(--border); text-align: left; background: rgba(255,255,255,0.02); }
        td { padding: 16px 18px; border-bottom: 1px solid var(--border); font-size: 14px; }
        tr:hover td { background: rgba(255,255,255,0.01); }

        /* UI ELEMENTS */
        .badge { padding: 5px 10px; border-radius: 4px; font-size: 10px; font-weight: 900; text-transform: uppercase; }
        .badge-active { background: var(--active); color: white; }
        .map-link { color: #3498db; cursor: pointer; font-weight: 800; border-bottom: 1px dashed #3498db; }
        .btn { background: var(--red); color: white; border: none; padding: 12px 20px; border-radius: 6px; font-weight: 700; cursor: pointer; text-transform: uppercase; font-size: 11px; transition: 0.2s; }
        .btn:hover { opacity: 0.8; transform: scale(1.02); }
        
        /* VEHICLE CHECK HOVER INFO */
        .check-cell { font-weight: bold; cursor: help; text-decoration: underline dotted; text-underline-offset: 4px; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-header">Frost Tracker</div>
        <div class="sidebar-content" id="sidebar-info">
            <p><strong>System:</strong> Operational</p>
            <p>Tracking Live Logs & Vehicle Defect Details.</p>
            <p style="margin-top:10px; color:var(--payroll)">Tip: Hover over "DEFECT" to see details.</p>
        </div>
        <div class="map-dock">
            <iframe id="sidebar-map" referrerpolicy="no-referrer-when-downgrade"></iframe>
        </div>
    </aside>

    <div class="main-wrapper">
        <div class="header">
            <div class="logo">Frost<span>Fleet</span> Elite</div>
            <button class="btn" onclick="loadData()">🔄 Refresh Fleet</button>
        </div>

        <div class="stats-grid">
            <div class="stat-card"><h3>Drivers</h3><p id="stat-total">0</p></div>
            <div class="stat-card" style="border-left-color: var(--active)"><h3>On Duty</h3><p id="stat-active" style="color:var(--active)">0</p></div>
            <div class="stat-card" style="border-left-color: var(--red)"><h3>15hr Alerts</h3><p id="stat-long" style="color:var(--red)">0</p></div>
            <div class="stat-card" style="border-left-color: var(--payroll)"><h3>Nights Out</h3><p id="stat-nights" style="color:var(--payroll)">0</p></div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Driver</th>
                        <th>Status</th>
                        <th>Weekly Hours</th>
                        <th>15hr Usage</th>
                        <th>Nights</th>
                        <th>Last Action</th>
                        <th>Vehicle Check</th>
                        <th>Location</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://mbudwnwxucluwgbkgbfx.supabase.co"; 
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1idWR3bnd4dWNsdXdnYmtnYmZ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyMDQwMjYsImV4cCI6MjA5MDc4MDAyNn0.xFv-FiQ894vdfJuQYWQyF4WzQXmlnmnKvz_c8nuzl5Q"; 
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzeQNNTsffmVMKNFhyJ9VQ-LVF_R58QMBTQQnC5enWwSrKaVHv9vC5r8_pryxAonfmXlg/exec";
        
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function updateDock(coords, name) {
            const mapFrame = document.getElementById('sidebar-map');
            mapFrame.style.display = "block";
            mapFrame.src = `https://www.google.com/maps?q=${coords}&t=k&z=15&output=embed`;
            document.getElementById('sidebar-info').innerHTML = `
                <div style="background:var(--red);padding:15px;border-radius:8px;color:white;">
                    <small>SATELLITE LOCK:</small><br>
                    <strong>${name.toUpperCase()}</strong><br>
                    <a href="https://www.google.com/maps?q=${coords}" target="_blank" style="color:white; font-size:10px; text-decoration:underline;">Open Maps App</a>
                </div>
            `;
        }

        async function loadData() {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = "<tr><td colspan='8' style='text-align:center; padding:50px; color:#666;'>POLLING DATA...</td></tr>";

            try {
                // 1. Fetch Vehicle Checks
                const vRes = await fetch(GOOGLE_SCRIPT_URL);
                const vehicleData = await vRes.json();

                // 2. Fetch Supabase Logs
                const now = new Date();
                const day = now.getDay();
                const diff = now.getDate() - day + (day === 0 ? -6 : 1);
                const monday = new Date(now.setDate(diff));
                monday.setHours(0,0,0,0);

                const { data: logs, error } = await _supabase
                    .from('fleet_logs')
                    .select('*')
                    .gte('created_at', monday.toISOString())
                    .order('created_at', { ascending: true });

                if (error) throw error;

                const report = {};
                let activeCount = 0, longCount = 0, nightCount = 0;

                logs.forEach(log => {
                    const nameKey = log.driver_name.toLowerCase().trim();
                    if (!report[nameKey]) {
                        report[nameKey] = { 
                            displayName: log.driver_name,
                            totalMs: 0, 
                            lastStart: null, 
                            status: 'OFFLINE', 
                            longShifts: 0, 
                            nights: 0, 
                            lastLoc: log.coordinates, 
                            lastTime: '' 
                        };
                    }
                    
                    const d = report[nameKey];

                    if (log.action_type === 'START') {
                        d.lastStart = new Date(log.created_at);
                        d.status = 'ACTIVE';
                    } else if (log.action_type === 'END' && d.lastStart) {
                        const shiftMs = new Date(log.created_at) - d.lastStart;
                        d.totalMs += shiftMs;
                        if (shiftMs > (15 * 60 * 60 * 1000)) d.longShifts++;
                        d.lastStart = null;
                        d.status = 'OFFLINE';
                    } else if (log.action_type === 'NIGHT OUT') {
                        d.nights++;
                    }
                    d.lastLoc = log.coordinates;
                    d.lastTime = new Date(log.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                });

                tbody.innerHTML = "";
                const drivers = Object.keys(report);
                
                drivers.forEach(key => {
                    const d = report[key];
                    
                    // Match with Google Sheet data
                    const vInfo = vehicleData[key] || { status: "⌛ NO CHECK", detail: "No check found for this driver today." };
                    const vColor = vInfo.status.includes("⚠️") ? "var(--red)" : (vInfo.status.includes("✅") ? "var(--active)" : "#777");
                    
                    if (d.status === 'ACTIVE') activeCount++;
                    longCount += d.longShifts;
                    nightCount += d.nights;

                    tbody.innerHTML += `
                        <tr>
                            <td><strong>${d.displayName.toUpperCase()}</strong></td>
                            <td><span class="badge ${d.status === 'ACTIVE' ? 'badge-active' : ''}" style="background:${d.status === 'ACTIVE' ? '' : '#444'}">${d.status}</span></td>
                            <td style="font-weight:700;">${(d.totalMs / (1000 * 60 * 60)).toFixed(2)}h</td>
                            <td style="color:${d.longShifts >= 3 ? 'var(--red)' : 'inherit'}; font-weight:bold;">${d.longShifts}/3</td>
                            <td>${d.nights}</td>
                            <td style="opacity:0.6">${d.lastTime}</td>
                            <td class="check-cell" style="color:${vColor}" title="${vInfo.detail}">${vInfo.status}</td>
                            <td><span class="map-link" onclick="updateDock('${d.lastLoc}', '${d.displayName}')">📍 View GPS</span></td>
                        </tr>
                    `;
                });

                document.getElementById('stat-total').innerText = drivers.length;
                document.getElementById('stat-active').innerText = activeCount;
                document.getElementById('stat-long').innerText = longCount;
                document.getElementById('stat-nights').innerText = nightCount;

            } catch (err) {
                console.error(err);
                tbody.innerHTML = `<tr><td colspan='8' style='text-align:center; color:orange; padding:30px;'>SYNC ERROR: Check Console for details.</td></tr>`;
            }
        }

        window.onload = loadData;
        setInterval(loadData, 60000); 
    </script>
</body>
</html>
